<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Someone Special ❤️</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= Background ================= -->

<div class="stars"></div>

<div class="hearts"></div>

<div class="overlay"></div>

<!-- ================= Music ================= -->

<div class="music-box">

<button id="musicBtn">

🎵 Play Music

</button>

<audio id="music" loop>

<source src="music.mp3" type="audio/mp3">

</audio>

</div>

<!-- ================= Main Container ================= -->

<div class="container">

<h1 class="title">

You've Got Mail 💌

</h1>

<p class="subtitle">

Click the envelope to open your letter

</p>

<!-- ================= Envelope ================= -->

<div class="envelope" id="envelope">

<div class="lid"></div>

<div class="cover"></div>

<div class="letter">

<h2>

Dear You ❤️

</h2>

<p id="message"></p>

<button id="nextBtn">

One More Thing →

</button>

</div>

</div>

</div>

<!-- ================= Surprise Screen ================= -->

<section class="surprise" id="surprise">

<div class="glass">

<h1>

❤️

</h1>

<h2>

Thank You...

</h2>

<p>

Thank you for being one of the brightest parts of my life.

You make ordinary moments unforgettable.

This little website is just a reminder that

you're appreciated more than words can explain.

</p>

<button id="galleryBtn">

View Memories 📸

</button>

</div>

</section>

<!-- ================= Photo Gallery ================= -->

<section class="gallery" id="gallery">

<h1>

Our Memories ❤️

</h1>

<div class="photos">

<img src="images/photo1.jpg">

<img src="images/photo2.jpg">

<img src="images/photo3.jpg">

<img src="images/photo4.jpg">

</div>

<button id="closeGallery">

Close Gallery

</button>

</section>

<canvas id="confetti"></canvas>

<script src="script.js"></script>

</body>

</html>
