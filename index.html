<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Someone Special ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background-hearts"></div>

<div class="music">
    <button id="musicBtn">🎵 Play Music</button>
    <audio id="song" loop>
        <source src="music.mp3" type="audio/mp3">
    </audio>
</div>

<div class="container">

    <h1 class="title">
        You've Got Mail 💌
    </h1>

    <p class="subtitle">
        Tap the envelope...
    </p>

    <div class="envelope" id="envelope">

        <div class="top"></div>

        <div class="letter">

            <h2>❤️ Dear You, ❤️</h2>

            <p id="typewriter"></p>

            <button id="surpriseBtn">
                One More Thing...
            </button>

        </div>

    </div>

</div>

<div class="surprise" id="surprise">

    <h1>❤️</h1>

    <h2>
        Thank you for being in my life.
    </h2>

    <p>
        Every moment with you becomes a memory I'll always cherish.
    </p>

</div>

<canvas id="confetti"></canvas>

<script src="script.js"></script>

</body>
</html>
